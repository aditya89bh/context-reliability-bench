[tox]
envlist = py310, py311, py312
isolated_build = true

[testenv]
deps =
    pytest>=8.0
    ruff>=0.4
    mypy>=1.10
commands =
    ruff check .
    mypy .
    pytest {posargs}

[testenv:coverage]
deps =
    pytest>=8.0
    pytest-cov>=5.0
commands =
    pytest --cov=context_reliability_bench \
           --cov-report=term-missing \
           --cov-fail-under=80 \
           {posargs}
