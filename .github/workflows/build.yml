name: Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build and validate wheel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify wheel is installable
        run: |
          pip install dist/*.whl
          python -c "import context_reliability_bench; print(context_reliability_bench.__version__)"

      - name: Verify sdist is installable
        run: |
          pip install dist/*.tar.gz
          python -c "import context_reliability_bench; print(context_reliability_bench.__version__)"

      - name: Upload build artefacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
